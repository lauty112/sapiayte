<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Escanear QR - Sapy'Aite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Jost', sans-serif;
            background: #1a1a18;
            color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .scanner-header { text-align: center; margin-bottom: 2rem; }
        .scanner-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #b89a5a; }
        .scanner-header p  { color: #7a7065; margin-top: 0.5rem; }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        #video { width: 100%; height: auto; display: block; }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid #c0471a;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: #c0471a;
            animation: scan 2s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.85rem 2rem;
            font-family: 'Jost', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #b89a5a;
            background: transparent;
            color: #b89a5a;
        }

        .btn-primary { background: #c0471a; border-color: #c0471a; color: white; }
        .btn-primary:hover { background: #a33a12; }
        .btn:hover { background: #b89a5a; color: #1a1a18; }

        .result {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(184,154,90,0.1);
            border-radius: 10px;
            text-align: center;
            max-width: 500px;
        }
        .result.success { background: rgba(76,175,80,0.2); border-left: 3px solid #4caf50; }
        .result.error   { background: rgba(244,67,54,0.2);  border-left: 3px solid #f44336; }
        .result.info    { background: rgba(184,154,90,0.1); border-left: 3px solid #b89a5a; }
        .result h3 { color: #b89a5a; margin-bottom: 0.5rem; }

        .loading { display: none; text-align: center; margin-top: 1rem; }
        .loading.active { display: block; }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(184,154,90,0.3);
            border-top-color: #b89a5a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .back-link { margin-top: 2rem; color: #7a7065; text-decoration: none; font-size: 0.8rem; }
        .back-link:hover { color: #b89a5a; }

        footer { text-align: center; padding: 1.5rem; color: #7a7065; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="scanner-header">
            <h1>Escanear QR de la mesa</h1>
            <p>Acercá el código QR de tu mesa a la cámara</p>
        </div>

        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="scan-overlay"></div>
            <div class="scan-line"></div>
        </div>

        <div class="controls">
            <button class="btn" id="startCamera">📷 Iniciar cámara</button>
            <button class="btn" id="stopCamera">⏹️ Detener</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top:0.5rem;">Verificando mesa...</p>
        </div>

        <div id="result"></div>

        <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>

    <footer>
        <p>Sapy'Aite — Escaneá el QR de tu mesa para comenzar a pedir</p>
    </footer>

    <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
    <script>
        // ✅ FIX: URL centralizada y adaptable para entorno local / remoto.
        const DEFAULT_API_URL = 'https://sapiayte-bz3i.onrender.com';
        const API_URL = window.API_URL || (() => {
            const host = window.location.hostname;
            const isLocal = host === 'localhost' || host === '127.0.0.1' || window.location.protocol === 'file:';
            return isLocal ? 'http://localhost:5000/api' : DEFAULT_API_URL;
        })();
        console.log('API_URL =', API_URL);

        let codeReader = null;
        let videoInputDevices = [];
        let isScanning = false;

        const videoElement = document.getElementById('video');
        const loadingDiv  = document.getElementById('loading');
        const resultDiv   = document.getElementById('result');

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams  = new URLSearchParams(window.location.search);
            const tokenParam = urlParams.get('token');

            if (tokenParam) {
                // Caso 1: El smartphone leyó el QR directamente con su cámara nativa
                // y redirigió a esta página con ?token=...
                procesarQR(tokenParam);
            } else {
                // Caso 2: El usuario entró manualmente; mostrar mesa si ya está guardada
                const savedMesa = localStorage.getItem('mesa_actual');
                if (savedMesa) {
                    try {
                        const mesa = JSON.parse(savedMesa);
                        resultDiv.innerHTML = `
                            <div class="result success">
                                <h3>✓ Mesa ya verificada</h3>
                                <p>Mesa ${mesa.numero} — <a href="index.html" style="color:#b89a5a;font-weight:bold;">Ir al menú →</a></p>
                            </div>`;
                    } catch(e) {
                        localStorage.removeItem('mesa_actual');
                    }
                }
            }
        });

        async function initCamera() {
            try {
                codeReader = new ZXing.BrowserMultiFormatReader();
                videoInputDevices = await codeReader.listVideoInputDevices();

                if (videoInputDevices.length === 0) {
                    showResult('error', 'No se encontró ninguna cámara en este dispositivo');
                    return;
                }

                // Preferir cámara trasera
                const backCamera = videoInputDevices.find(d =>
                    /back|trasera|environnement/i.test(d.label)
                );
                const deviceId = backCamera ? backCamera.deviceId : videoInputDevices[0].deviceId;

                await startScanning(deviceId);

            } catch (err) {
                console.error('Error al iniciar cámara:', err);
                showResult('error', 'No se pudo acceder a la cámara. Verificá los permisos del navegador.');
            }
        }

        async function startScanning(deviceId) {
            if (isScanning) await stopScanning();

            try {
                await codeReader.decodeFromVideoDevice(deviceId, videoElement, (result, err) => {
                    if (result) {
                        let token = result.getText();
                        // Soporta QR con URL completa (ej: https://...?token=XXX) o token plano
                        if (token.includes('token=')) {
                            try {
                                token = new URL(token).searchParams.get('token');
                            } catch(_) { /* dejarlo como está si la URL es inválida */ }
                        }
                        procesarQR(token);
                        stopScanning();
                    }
                    if (err && !(err instanceof ZXing.NotFoundException)) {
                        console.error('Error de escaneo:', err);
                    }
                });

                isScanning = true;
                showResult('info', 'Cámara activa. Apuntá al código QR de la mesa...');

            } catch (err) {
                console.error('Error al iniciar el escaneo:', err);
                showResult('error', 'Error al iniciar el escaneo continuo');
            }
        }

        async function stopScanning() {
            if (codeReader && isScanning) {
                await codeReader.reset();
                isScanning = false;
            }
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(t => t.stop());
                videoElement.srcObject = null;
            }
        }

        async function procesarQR(qrData) {
            loadingDiv.classList.add('active');
            resultDiv.innerHTML = '';

            try {
                // ✅ Usa la constante API_URL en lugar de URL literal
                const response = await fetch(`${API_URL}/mesa/verificar`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ token: qrData })
                });

                const data = await response.json();

                if (data.success) {
                    guardarMesa(data.mesa);
                    localStorage.setItem('mesa_token', qrData);

                    showResult('success',
                        `<h3>✓ Éxito</h3>
                         <p>¡Mesa ${data.mesa.numero} asignada correctamente!<br>Redirigiendo al menú...</p>`
                    );

                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);

                } else {
                    showResult('error', `❌ ${data.error || 'Código QR o mesa no válida.'}`);

                    // Reanudar escaneo automáticamente si la cámara estaba activa
                    if (isScanning && videoInputDevices.length > 0) {
                        setTimeout(() => startScanning(videoInputDevices[0].deviceId), 3000);
                    }
                }

            } catch (error) {
                console.error('Error al verificar mesa:', error);
                showResult('error', `Error de comunicación con el servidor. ¿Está el backend corriendo en ${API_URL}?`);
            } finally {
                loadingDiv.classList.remove('active');
            }
        }

        function guardarMesa(mesa) {
            const mesaJson = JSON.stringify(mesa);
            localStorage.setItem('mesa_actual', mesaJson);
            sessionStorage.setItem('mesa_actual', mesaJson);
            console.log("✅ Mesa guardada:", mesa);
        }

        function showResult(type, message) {
            if (message.includes('<h3>')) {
                resultDiv.innerHTML = `<div class="result ${type}">${message}</div>`;
            } else {
                const titles = { success: '✓ Éxito', error: '✗ Error', info: 'ℹ️ Información' };
                resultDiv.innerHTML = `
                    <div class="result ${type}">
                        <h3>${titles[type] || ''}</h3>
                        <p>${message}</p>
                    </div>`;
            }
        }

        document.getElementById('startCamera').addEventListener('click', initCamera);
        document.getElementById('stopCamera').addEventListener('click', stopScanning);
    </script>
</body>
</html>
