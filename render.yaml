services:
  - type: web
    name: sapyaite-api
    runtime: python
    repo: https://github.com/lauty112/sapiayte  # ✅ SOLO la URL base, sin /tree/main
    plan: free
    branch: main  # ✅ Especificá la rama explícitamente
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: sapyaite
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sapyaite
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sapyaite
          property: database
      - key: DB_USER
        fromDatabase:
          name: sapyaite
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sapyaite
          property: password
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: sapyaite
    plan: free